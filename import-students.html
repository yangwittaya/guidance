let done = 0, errors = 0;

function log(msg, type='ok') {
  const box = document.getElementById('logBox');
  const el = document.createElement('div');
  el.className = 'log-entry log-' + type;
  el.textContent = msg;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function updateProgress() {
  const total = STUDENTS.length;
  const pct = Math.round(((done + errors) / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done + errors} / ${total} (${pct}%)`;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statErr').textContent = errors;
}

async function startImport() {
  const btn = document.getElementById('importBtn');

  // ตรวจสอบ login
  const user = firebase.auth().currentUser;
  if (!user) {
    alert('กรุณาเข้าสู่ระบบในฐานะ Admin ก่อน\nไปที่ login.html แล้วกลับมาที่หน้านี้');
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ กำลังนำเข้า...';
  document.getElementById('logBox').innerHTML = '';
  done = 0; errors = 0;

  log(`เริ่มนำเข้า ${STUDENTS.length} คน โดย ${user.email}`, 'info');

  const batch_size = 10;
  for (let i = 0; i < STUDENTS.length; i += batch_size) {
    const batch = db.batch();
    const chunk = STUDENTS.slice(i, i + batch_size);

    for (const s of chunk) {
      try {
        const ref = db.collection('students').doc();
        batch.set(ref, {
          ...s,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      } catch(e) {
        errors++;
        log(`❌ ${s.fullname}: ${e.message}`, 'err');
      }
    }

    try {
      await batch.commit();
      const end = Math.min(i + batch_size, STUDENTS.length);
      done += chunk.length;
      log(`✅ นำเข้าแล้ว ${i+1}–${end}: ${chunk.map(s=>s.fname).join(', ')}`, 'ok');
    } catch(e) {
      errors += chunk.length;
      done -= chunk.length - (chunk.length - errors);
      log(`❌ batch ${i+1}–${i+chunk.length} ผิดพลาด: ${e.message}`, 'err');
    }

    updateProgress();
    await new Promise(r => setTimeout(r, 200)); // หน่วงเล็กน้อยไม่ให้ Firestore โอเวอร์โหลด
  }

  if (errors === 0) {
    btn.className = 'btn btn-success';
    btn.textContent = `✅ นำเข้าสำเร็จ ${done} คน`;
    log(`\n🎉 เสร็จสมบูรณ์! นำเข้า ${done} คน`, 'info');
  } else {
    btn.textContent = `⚠️ เสร็จแล้ว (สำเร็จ ${done}, ผิดพลาด ${errors})`;
    log(`เสร็จแล้ว: สำเร็จ ${done} คน, ผิดพลาด ${errors} คน`, 'err');
  }
}

// ตรวจสอบ login state
firebase.auth().onAuthStateChanged(user => {
  if (!user) {
    document.getElementById('importBtn').textContent = '⚠️ กรุณา Login ก่อน';
    document.getElementById('importBtn').disabled = true;
    log('ยังไม่ได้เข้าสู่ระบบ — กรุณาไปที่ login.html ก่อน', 'err');
  } else {
    log(`✅ Login แล้ว: ${user.email}`, 'info');
  }
});
</script>
